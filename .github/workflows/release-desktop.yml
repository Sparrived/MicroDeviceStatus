name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop version without prefix (e.g. 0.3.0). Empty = draft."
        required: false
        default: ""
      publish:
        description: "Create GitHub Release"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.x"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Resolve version
        id: meta
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw="$DISPATCH_VERSION"
            publish="$DISPATCH_PUBLISH"
            draft=false
            if [[ -z "$raw" ]]; then
              raw="0.0.0-draft.$(date -u +%Y%m%d%H%M%S)"
              draft=true
            fi
          else
            raw="${GITHUB_REF_NAME#desktop-v}"
            publish=true
            draft=false
          fi
          echo "version=${raw}" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v${raw}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "Resolved desktop version=desktop-v${raw} publish=${publish}"

  desktop:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            mds_desktop/go.mod

      - name: Package desktop archives
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh scripts/build.sh scripts/docker-entrypoint.sh
          ./scripts/package-release.sh "$VERSION"
          mkdir -p dist/desktop
          find dist/release -maxdepth 1 -type f \
            \( -name 'mds-desktop-*.zip' -o -name 'mds-desktop-*.tar.gz' \) \
            -exec cp {} dist/desktop/ \;
          (
            cd dist/desktop
            sha256sum *.zip *.tar.gz > SHA256SUMS.txt
          )
          cat > dist/desktop/release-manifest.json <<EOF
          {
            "name": "MicroDeviceStatus",
            "component": "desktop",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "artifacts": ["windows-amd64", "linux-amd64", "linux-arm64", "darwin-amd64", "darwin-arm64"]
          }
          EOF
          sed -i 's/^          //' dist/desktop/release-manifest.json

      - name: Upload desktop packages
        uses: actions/upload-artifact@v4
        with:
          name: desktop-packages
          path: dist/desktop/*
          if-no-files-found: error

  publish:
    needs: [prepare, desktop]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          name: desktop-packages
          path: release

      - name: Write release notes
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          cat > release/RELEASE_NOTES.md <<EOF
          ## MicroDeviceStatus Desktop ${TAG}

          - Windows / Linux / macOS install archives: `mds-desktop-*`
          - Checksums: `SHA256SUMS.txt`
          EOF
          sed -i 's/^          //' release/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: MicroDeviceStatus Desktop ${{ needs.prepare.outputs.tag }}
          body_path: release/RELEASE_NOTES.md
          draft: ${{ needs.prepare.outputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.tar.gz
            release/SHA256SUMS.txt
            release/release-manifest.json
            release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
