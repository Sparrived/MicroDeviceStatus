name: Release Server

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Server version without prefix (e.g. 0.3.0). Empty = draft."
        required: false
        default: ""
      publish:
        description: "Create GitHub Release and push container image"
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  packages: write

concurrency:
  group: release-server-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.x"
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      image: ${{ steps.meta.outputs.image }}
      should_publish: ${{ steps.meta.outputs.should_publish }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - name: Resolve version
        id: meta
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            raw="$DISPATCH_VERSION"
            publish="$DISPATCH_PUBLISH"
            draft=false
            if [[ -z "$raw" ]]; then
              raw="0.0.0-draft.$(date -u +%Y%m%d%H%M%S)"
              draft=true
            fi
          else
            raw="${GITHUB_REF_NAME#server-v}"
            publish=true
            draft=false
          fi
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/microdevicestatus"
          echo "version=${raw}" >> "$GITHUB_OUTPUT"
          echo "tag=server-v${raw}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "draft=${draft}" >> "$GITHUB_OUTPUT"
          echo "Resolved server version=server-v${raw} publish=${publish} image=${image}"

  server-packages:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            mds_desktop/go.mod

      - name: Package server archives
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          chmod +x scripts/package-release.sh scripts/build.sh scripts/docker-entrypoint.sh
          ./scripts/package-release.sh "$VERSION"
          mkdir -p dist/server
          find dist/release -maxdepth 1 -type f \
            \( -name 'mds-server-*.zip' -o -name 'mds-server-*.tar.gz' \) \
            -exec cp {} dist/server/ \;
          (
            cd dist/server
            sha256sum *.zip *.tar.gz > SHA256SUMS.txt
          )
          cat > dist/server/release-manifest.json <<EOF
          {
            "name": "MicroDeviceStatus",
            "component": "server",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "artifacts": ["windows-amd64", "linux-amd64", "linux-arm64", "darwin-amd64", "darwin-arm64", "docker"]
          }
          EOF
          sed -i 's/^          //' dist/server/release-manifest.json

      - name: Upload server packages
        uses: actions/upload-artifact@v4
        with:
          name: server-packages
          path: dist/server/*
          if-no-files-found: error

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.prepare.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image }}
          tags: |
            type=raw,value=v${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.should_publish == 'true' && needs.prepare.outputs.draft == 'false' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.prepare.outputs.should_publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Write Docker notes
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE: ${{ needs.prepare.outputs.image }}
        run: |
          set -euo pipefail
          mkdir -p dist/docker
          image="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          cat > dist/docker/DOCKER.txt <<EOF
          MicroDeviceStatus Docker image

          Image: ${image}:v${VERSION}
          Also:  ${image}:latest (stable releases only)

          Quick start:

            docker pull ${image}:v${VERSION}

            cat > .env <<'ENV'
            MDS_ADMIN_TOKEN=replace-with-a-long-random-token
            MDS_ADMIN_USERNAME=admin
            MDS_ADMIN_PASSWORD=replace-with-a-long-password
            MDS_COOKIE_SECURE=0
            ENV

            docker run -d --name microdevicestatus --restart unless-stopped \\
              -p 127.0.0.1:8080:8080 \\
              --env-file .env \\
              -e MDS_ADDR=:8080 \\
              -e MDS_DB_PATH=/data/micro-device-status.db \\
              -v mds-data:/data \\
              ${image}:v${VERSION}

            curl -sS http://127.0.0.1:8080/healthz
          EOF
          sed -i 's/^          //' dist/docker/DOCKER.txt

      - name: Upload Docker notes
        uses: actions/upload-artifact@v4
        with:
          name: docker-notes
          path: dist/docker/DOCKER.txt
          if-no-files-found: error

  publish:
    needs: [prepare, server-packages, docker]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download server packages
        uses: actions/download-artifact@v4
        with:
          name: server-packages
          path: release

      - name: Download Docker notes
        uses: actions/download-artifact@v4
        with:
          name: docker-notes
          path: release

      - name: Write release notes
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          IMAGE: ${{ needs.prepare.outputs.image }}
        run: |
          set -euo pipefail
          cat > release/RELEASE_NOTES.md <<EOF
          ## MicroDeviceStatus Server ${TAG}

          - Server install archives: `mds-server-*`
          - Docker image: `${IMAGE}:v${VERSION}`
          - Docker Compose bundle: `mds-server-docker-${VERSION}.tar.gz`
          - Checksums: `SHA256SUMS.txt`

          Docker:

          ```bash
          docker pull ${IMAGE}:v${VERSION}
          ```
          EOF
          sed -i 's/^          //' release/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: MicroDeviceStatus Server ${{ needs.prepare.outputs.tag }}
          body_path: release/RELEASE_NOTES.md
          draft: ${{ needs.prepare.outputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release/*.zip
            release/*.tar.gz
            release/SHA256SUMS.txt
            release/release-manifest.json
            release/DOCKER.txt
            release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
